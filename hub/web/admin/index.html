<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeClaw Hub Admin Console</title>
  <style>
    :root{--bg:#eef3f9;--panel:#fff;--soft:#f8fbff;--text:#172133;--muted:#6b7890;--line:rgba(16,31,56,.1);--primary:#0f62fe;--ok:#0c8f5f;--warn:#b97700;--danger:#c73c2f}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    .hidden{display:none!important}.shell{padding:24px}.card{background:rgba(255,255,255,.95);border:1px solid rgba(16,31,56,.08);border-radius:24px;box-shadow:0 20px 60px rgba(22,34,58,.12)}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center}.login-card{width:min(1080px,100%);display:grid;grid-template-columns:1.1fr .9fr;overflow:hidden}
    .hero{padding:36px;background:linear-gradient(165deg,#0d1832 0%,#153a85 58%,#0f62fe 100%);color:#fff}.hero h1{margin:16px 0 10px;font-size:34px}.hero p,.hero li{color:rgba(255,255,255,.84);line-height:1.7}
    .mini{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(15,98,254,.12);color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .form{padding:32px;display:flex;flex-direction:column;gap:14px;justify-content:center}.form h2{margin:0;font-size:28px}.subtle{color:var(--muted);line-height:1.6}
    .stage-toggle,.actions,.topbar,.lang-switch{display:flex;gap:10px;flex-wrap:wrap}.stage-toggle button{flex:1;min-width:160px}
    .stage-card{padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--soft)}
    label{display:block;margin-bottom:8px;color:var(--muted);font-size:13px;font-weight:700} input,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff}
    button{border:0;border-radius:12px;padding:10px 15px;font:inherit;font-weight:700;cursor:pointer}.btn-primary{background:linear-gradient(135deg,#0f62fe,#2187ff);color:#fff}.btn-secondary{background:#edf3ff;color:#1949ac}.btn-danger{background:#fff0ed;color:var(--danger)}.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
    .console{min-height:150px;max-height:280px;overflow:auto;white-space:pre-wrap;border-radius:16px;border:1px solid #0f172a;background:#101a31;color:#d7e3ff;padding:14px;font-family:Consolas,monospace;font-size:12px;line-height:1.7}
    .app{min-height:100vh;display:grid;grid-template-columns:270px 1fr}.side{background:linear-gradient(180deg,#101b34 0%,#17294d 100%);color:#fff;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
    .brand h1{margin:12px 0 6px;font-size:28px}.brand p{margin:0;color:rgba(255,255,255,.72);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:8px}.nav button{text-align:left;background:transparent;color:rgba(255,255,255,.84);border:1px solid transparent;padding:12px 14px;border-radius:14px}.nav button.active{background:rgba(255,255,255,.1);color:#fff}.nav small{display:block;margin-top:4px;color:rgba(255,255,255,.58)}
    .side-note{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.76);font-size:13px;line-height:1.65}.mono{font-family:Consolas,monospace;font-size:12px;word-break:break-all}
    .main{padding:24px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar{align-items:center}
    .lang-switch{padding:4px;border-radius:999px;background:#fff;border:1px solid var(--line)}.lang-switch button{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted)}.lang-switch button.active{background:var(--primary);color:#fff}
    .admin-chip{padding:10px 14px;border-radius:14px;background:#fff;border:1px solid var(--line)}.admin-chip strong{display:block;font-size:14px}.admin-chip span{display:block;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase}.ok{background:rgba(12,143,95,.12);color:var(--ok)}.warn{background:rgba(185,119,0,.14);color:var(--warn)}.danger{background:rgba(199,60,47,.12);color:var(--danger)}.info{background:rgba(15,98,254,.12);color:var(--primary)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric,.item{padding:18px;border-radius:18px;background:var(--panel);border:1px solid var(--line)}.metric label{font-size:12px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;font-size:28px;line-height:1;margin:8px 0 6px}.metric span,.item-meta,.desc,.hint{color:var(--muted);font-size:13px;line-height:1.6}
    .panel{display:none;padding:22px}.panel.active{display:block}.head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.head h3{margin:0;font-size:22px}
    .grid2,.grid3,.table{display:grid;gap:14px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.hint{padding:14px 16px;border-radius:16px;background:rgba(15,23,42,.04);border:1px dashed rgba(15,23,42,.16)}
    .item + .item{margin-top:12px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px}.item-title{font-weight:700;font-size:15px}
    .row{display:grid;grid-template-columns:1.2fr .95fr .9fr .95fr;gap:12px;padding:14px 16px;border-radius:16px;background:#fff;border:1px solid var(--line);align-items:center}.row.header{background:#f6f9fe;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase}
    .toast-stack{position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;max-width:min(360px,calc(100vw - 36px))}.toast{padding:14px 16px;border-radius:16px;background:#14213d;color:#fff;box-shadow:0 16px 36px rgba(15,23,42,.22);border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease}.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#0f6d4b}.toast.error{background:#9f2f24}.toast.info{background:#184aa8}
    @media (max-width:1180px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.login-card,.app{grid-template-columns:1fr}} @media (max-width:760px){.shell,.main{padding:18px}.metrics,.grid2,.grid3{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="toastStack" class="toast-stack"></div>
  <div id="loginView" class="login shell">
    <div class="login-card card">
      <div class="hero">
        <div class="mini">CodeClaw Hub</div>
        <h1 data-i18n="loginHeroTitle"></h1>
        <p data-i18n="loginHeroDesc"></p>
        <ul>
          <li data-i18n="loginBullet1"></li>
          <li data-i18n="loginBullet2"></li>
          <li data-i18n="loginBullet3"></li>
        </ul>
      </div>
      <div class="form">
        <div class="mini" data-i18n="adminAccess"></div>
        <h2 data-i18n="loginTitle"></h2>
        <p class="subtle" id="authStageHint"></p>
        <div id="stageToggle" class="stage-toggle hidden">
          <button id="setupStageButton" class="btn-secondary" type="button" onclick="showAuthStage('setup')" data-i18n="firstSetup"></button>
          <button id="loginStageButton" class="btn-ghost" type="button" onclick="showAuthStage('login')" data-i18n="adminLogin"></button>
        </div>
        <div id="setupStage" class="stage-card hidden">
          <h3 data-i18n="firstSetup"></h3>
          <p class="subtle" data-i18n="setupDesc"></p>
          <div>
            <label for="setupUsername" data-i18n="adminUsername"></label>
            <input id="setupUsername" placeholder="admin">
          </div>
          <div>
            <label for="setupPassword" data-i18n="adminPassword"></label>
            <input id="setupPassword" type="password">
          </div>
          <div class="actions"><button class="btn-secondary" onclick="setupAdmin()" data-i18n="saveInit"></button></div>
        </div>
        <div id="loginStage" class="stage-card hidden">
          <h3 data-i18n="adminLogin"></h3>
          <p class="subtle" data-i18n="signinDesc"></p>
          <div>
            <label for="loginUsername" data-i18n="adminUsername"></label>
            <input id="loginUsername" placeholder="admin">
          </div>
          <div>
            <label for="loginPassword" data-i18n="adminPassword"></label>
            <input id="loginPassword" type="password">
          </div>
          <div class="actions"><button class="btn-primary" onclick="loginAdmin()" data-i18n="signIn"></button></div>
        </div>
        <div id="loginOutput" class="console"></div>
      </div>
    </div>
  </div>

  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="brand">
        <div class="mini" style="background:rgba(255,255,255,.1);color:#fff">CodeClaw Hub</div>
        <h1 data-i18n="brandTitle"></h1>
        <p data-i18n="brandDesc"></p>
      </div>
      <nav class="nav">
        <button data-tab="overview" class="active" onclick="openTab('overview')"><span data-i18n="navOverview"></span><small data-i18n="navOverviewDesc"></small></button>
        <button data-tab="center" onclick="openTab('center')"><span data-i18n="navCenter"></span><small data-i18n="navCenterDesc"></small></button>
        <button data-tab="governance" onclick="openTab('governance')"><span data-i18n="navGovernance"></span><small data-i18n="navGovernanceDesc"></small></button>
        <button data-tab="machines" onclick="openTab('machines')"><span data-i18n="navMachines"></span><small data-i18n="navMachinesDesc"></small></button>
        <button data-tab="console" onclick="openTab('console')"><span data-i18n="navConsole"></span><small data-i18n="navConsoleDesc"></small></button>
      </nav>
      <div class="side-note"><span data-i18n="defaultCenter"></span><br><span class="mono">http://127.0.0.1:9388</span><br><br><span data-i18n="deployHint"></span></div>
    </aside>
    <main class="main">
      <div class="top">
        <div><h2 id="pageTitle"></h2><div class="subtle" id="pageSubtitle"></div></div>
        <div class="topbar">
          <div class="lang-switch">
            <button type="button" data-lang="en" onclick="setLanguage('en')">EN</button>
            <button type="button" data-lang="zh" onclick="setLanguage('zh')">中文</button>
          </div>
          <div class="admin-chip"><strong id="adminDisplayName"></strong><span id="adminDisplayMeta"></span></div>
          <span id="authBadge" class="badge ok"></span>
          <button class="btn-ghost" onclick="logoutAdmin()" data-i18n="logout"></button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><label data-i18n="metricCenter"></label><strong id="centerStatusHero"></strong><span id="centerStatusHint"></span></div>
        <div class="metric"><label data-i18n="metricMachines"></label><strong id="machineCountHero">0</strong><span data-i18n="metricMachinesHint"></span></div>
        <div class="metric"><label data-i18n="metricBlocked"></label><strong id="blockedCountHero">0</strong><span data-i18n="metricBlockedHint"></span></div>
        <div class="metric"><label data-i18n="metricInvites"></label><strong id="inviteCountHero">0</strong><span data-i18n="metricInvitesHint"></span></div>
      </div>
      <section id="tab-overview" class="panel card active"><div class="head"><div><h3 data-i18n="overviewTitle"></h3><div class="desc" data-i18n="overviewDesc"></div></div><button class="btn-ghost" onclick="refreshAll()" data-i18n="refreshAll"></button></div><div class="grid2"><div class="hint" id="centerStatusDetail"></div><div class="item"><div class="item-title" data-i18n="endpointTitle"></div><div class="item-meta" data-i18n="endpointDesc"></div><div class="mono" id="centerAdvertisedURL" style="margin-top:8px;color:var(--text)"></div></div></div></section>
      <section id="tab-center" class="panel card"><div class="head"><div><h3 data-i18n="centerTitle"></h3><div class="desc" data-i18n="centerDesc"></div></div><button class="btn-ghost" onclick="loadCenterStatus()" data-i18n="refreshStatus"></button></div><div class="grid2"><div class="item"><label for="centerBaseURL" data-i18n="centerUrl"></label><input id="centerBaseURL" placeholder="http://127.0.0.1:9388"><label for="centerVisibility" style="margin-top:12px" data-i18n="visibilityMode"></label><select id="centerVisibility"><option value="private" data-i18n="visibilityPrivate"></option><option value="shared" data-i18n="visibilityShared"></option></select><label for="centerEnrollmentMode" style="margin-top:12px" data-i18n="enrollmentMode"></label><select id="centerEnrollmentMode"><option value="open" data-i18n="enrollmentOpen"></option><option value="approval" data-i18n="enrollmentApproval"></option><option value="manual" data-i18n="enrollmentManual"></option></select><div id="centerRegisterActions" class="actions"><button class="btn-secondary" onclick="saveCenterConfig()" data-i18n="saveAddress"></button><button id="registerNowButton" class="btn-primary" onclick="registerWithCenter()" data-i18n="registerNow"></button></div><div id="centerRegisteredNotice" class="hint hidden" style="margin-top:14px"><strong id="centerRegisteredTitle"></strong><div class="item-meta" id="centerRegisteredHint" style="margin-top:8px"></div></div></div><div class="item"><div class="item-title" data-i18n="registrationStatus"></div><div class="item-meta" id="centerStatusDetailTab"></div><div class="grid3" style="margin-top:14px"><div><label data-i18n="advertisedHost"></label><div class="mono" id="centerAdvertisedHost"></div></div><div><label data-i18n="advertisedPort"></label><div class="mono" id="centerAdvertisedPort"></div></div><div><label data-i18n="visibilityMode"></label><div class="mono" id="visibilityHero"></div></div></div><div style="margin-top:14px"><label data-i18n="enrollmentMode"></label><div class="mono" id="modeHero"></div></div></div></div></section>
      <section id="tab-governance" class="panel card"><div class="head"><div><h3 data-i18n="governanceTitle"></h3><div class="desc" data-i18n="governanceDesc"></div></div></div><div class="grid3"><div class="item"><label for="bindEmail" data-i18n="manualBindEmail"></label><input id="bindEmail" placeholder="user@example.com"><div class="actions"><button class="btn-secondary" onclick="manualBind()" data-i18n="generateBinding"></button></div></div><div class="item"><label for="blockedEmail" data-i18n="blockedEmail"></label><input id="blockedEmail" placeholder="blocked@example.com"><label for="blockedReason" style="margin-top:12px" data-i18n="reason"></label><input id="blockedReason"><div class="actions"><button class="btn-danger" onclick="addBlockedEmail()" data-i18n="addBlock"></button></div></div><div class="item"><label for="inviteEmail" data-i18n="inviteEmail"></label><input id="inviteEmail" placeholder="invite@example.com"><label for="inviteRole" style="margin-top:12px" data-i18n="role"></label><select id="inviteRole"><option value="viewer" data-i18n="roleViewer"></option><option value="member" data-i18n="roleMember"></option><option value="admin" data-i18n="roleAdmin"></option></select><div class="actions"><button class="btn-primary" onclick="addInvite()" data-i18n="createInvite"></button></div></div></div><div class="grid2" style="margin-top:18px"><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="blockedEmailsTitle"></div><div class="item-meta" data-i18n="blockedEmailsDesc"></div></div><button class="btn-ghost" onclick="loadBlockedEmails()" data-i18n="reload"></button></div><div id="blockedEmails"><div class="hint" data-i18n="emptyBlocked"></div></div></div><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="invitesTitle"></div><div class="item-meta" data-i18n="invitesDesc"></div></div><button class="btn-ghost" onclick="loadInvites()" data-i18n="reload"></button></div><div id="invites"><div class="hint" data-i18n="emptyInvites"></div></div></div></div><div class="item" style="margin-top:18px"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="boundUsersTitle"></div><div class="item-meta" data-i18n="boundUsersDesc"></div></div><button class="btn-ghost" onclick="loadBoundUsers()" data-i18n="reload"></button></div><div id="boundUsers"><div class="hint" data-i18n="emptyBoundUsers"></div></div></div><div class="item" style="margin-top:18px"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="mailConfigTitle"></div><div class="item-meta" data-i18n="mailConfigDesc"></div></div><button class="btn-ghost" onclick="loadMailConfig()" data-i18n="reload"></button></div><div class="grid3"><div><label for="mailProvider" data-i18n="mailProvider"></label><select id="mailProvider" onchange="applyMailPreset()"><option value="custom" data-i18n="mailPresetCustom"></option><option value="qq" data-i18n="mailPresetQQ"></option><option value="163" data-i18n="mailPreset163"></option><option value="126" data-i18n="mailPreset126"></option><option value="gmail" data-i18n="mailPresetGmail"></option><option value="outlook" data-i18n="mailPresetOutlook"></option></select></div><div><label for="mailHost" data-i18n="mailHost"></label><input id="mailHost" placeholder="smtp.example.com"></div><div><label for="mailPort" data-i18n="mailPort"></label><input id="mailPort" type="number" min="1" max="65535" placeholder="587"></div></div><div class="grid3" style="margin-top:12px"><div><label for="mailEncryption" data-i18n="mailEncryption"></label><select id="mailEncryption"><option value="auto" data-i18n="mailEncryptionAuto"></option><option value="ssl" data-i18n="mailEncryptionSSL"></option><option value="starttls" data-i18n="mailEncryptionStartTLS"></option><option value="plain" data-i18n="mailEncryptionPlain"></option></select></div><div><label for="mailUsername" data-i18n="mailUsername"></label><input id="mailUsername" placeholder="account@example.com"></div><div><label for="mailPassword" data-i18n="mailPassword"></label><input id="mailPassword" type="password"></div></div><div class="grid3" style="margin-top:12px"><div><label for="mailFromName" data-i18n="mailFromName"></label><input id="mailFromName" placeholder="CodeClaw Hub"></div><div><label for="mailFromEmail" data-i18n="mailFromEmail"></label><input id="mailFromEmail" placeholder="account@example.com"></div><div><label for="testMailEmail" data-i18n="mailTestRecipient"></label><input id="testMailEmail" placeholder="ops@example.com"></div></div><div class="actions" style="margin-top:14px"><button class="btn-secondary" onclick="saveMailConfig()" data-i18n="saveMailConfig"></button><button class="btn-primary" onclick="sendTestMail()" data-i18n="sendTestMail"></button></div></div><div class="item" style="margin-top:18px"><div class="item-title" id="passwordCardTitle"></div><div class="item-meta" id="passwordCardDesc" style="margin-bottom:12px"></div><div class="grid3"><div><label for="currentPasswordInput" id="currentPasswordLabel"></label><input id="currentPasswordInput" type="password"></div><div><label for="newPasswordInput" id="newPasswordLabel"></label><input id="newPasswordInput" type="password"></div><div><label for="confirmPasswordInput" id="confirmPasswordLabel"></label><input id="confirmPasswordInput" type="password"></div></div><div class="actions" style="margin-top:14px"><button class="btn-primary" onclick="changeAdminPassword()" id="changePasswordButton"></button></div></div></section>
      <section id="tab-machines" class="panel card"><div class="head"><div><h3 data-i18n="machinesTitle"></h3><div class="desc" data-i18n="machinesDesc"></div></div><button class="btn-ghost" onclick="loadMachines()" data-i18n="refreshMachines"></button></div><div class="hint" style="margin-bottom:14px" data-i18n="machinesHint"></div><div class="table" id="machines"></div></section>
      <section id="tab-console" class="panel card"><div class="head"><div><h3 data-i18n="consoleTitle"></h3><div class="desc" data-i18n="consoleDesc"></div></div><button class="btn-ghost" onclick="clearConsole()" data-i18n="clear"></button></div><div id="output" class="console"></div></section>
    </main>
  </div>
  <script>
    const adminTokenKey = 'codeclawHubAdminToken';
    const adminProfileKey = 'codeclawHubAdminProfile';
    const activeTabKey = 'codeclawHubActiveTab';
    const langKey = 'codeclawHubAdminLang';
    const I18N = {

    function renderInvites(items) { document.getElementById('inviteCountHero').textContent = String(items.length); const root = document.getElementById('invites'); if (!items.length) { root.innerHTML = '<div class="hint">' + tr('emptyInvites') + '</div>'; return; } root.innerHTML = items.map(v => `<div class="item"><div class="item-head"><div><div class="item-title">${v.email}</div><div class="item-meta">${tr('role')}: ${v.role || tr('roleViewer')}</div></div><span class="badge info">${v.status || tr('active')}</span></div></div>`).join(''); }
    function renderBoundUsers(items) { const root = document.getElementById('boundUsers'); if (!items.length) { root.innerHTML = '<div class="hint">' + tr('emptyBoundUsers') + '</div>'; return; } root.innerHTML = items.map(v => `<div class="item"><div class="item-head"><div><div class="item-title">${v.email}</div><div class="item-meta mono">${v.sn || tr('na')}</div></div><span class="badge info">${v.enrollment_status || v.status || tr('active')}</span></div></div>`).join(''); }
    function renderMachineList(items) { document.getElementById('machineCountHero').textContent = String(items.length); const root = document.getElementById('machines'); const header = `<div class="row header"><div>${tr('machine')}</div><div>${tr('platform')}</div><div>${tr('status')}</div><div>${tr('lastSeen')}</div></div>`; if (!items.length) { root.innerHTML = header + '<div class="hint">' + tr('noMachinesLoaded') + '</div>'; return; } root.innerHTML = header + items.map(v => { const state = v.status === 'online' ? tr('online') : v.status === 'offline' ? tr('offline') : (v.status || tr('unknown')); return `<div class="row"><div><strong>${v.name || v.machine_id || tr('machine')}</strong><div class="item-meta mono">${v.machine_id || ''}</div></div><div>${v.platform || tr('unknown')}</div><div><span class="badge ${(v.status === 'online' ? 'ok' : 'warn')}">${state}</span></div><div>${v.last_seen_at || tr('na')}</div></div>`; }).join(''); }
    async function lookupScopedUser(email) { if (!email) return null; const data = await api(`/api/admin/users/lookup?email=${encodeURIComponent(email)}`); return data.user || null; }
    async function setupAdmin() { try { if (adminInitialized) { setSetupAvailability(false); showAuthStage('login'); document.getElementById('loginPassword').focus(); return; } const username = document.getElementById('setupUsername').value.trim(); const data = await api('/api/admin/setup', { method: 'POST', body: JSON.stringify({ username, password: document.getElementById('setupPassword').value }) }); document.getElementById('loginUsername').value = username; document.getElementById('loginPassword').value = ''; adminInitialized = true; setSetupAvailability(false); setOutput(tr('setupDone', { message: data.message || tr('administrator') }), 'loginOutput'); showAuthStage('login'); document.getElementById('loginPassword').focus(); } catch (err) { setOutput(tr('setupFailed', { error: err.message }), 'loginOutput'); } }
    async function loginAdmin() { try { const data = await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ username: document.getElementById('loginUsername').value.trim(), password: document.getElementById('loginPassword').value }) }); localStorage.setItem(adminTokenKey, data.access_token); localStorage.setItem(adminProfileKey, JSON.stringify(data.admin || {})); setAuthState(true); restoreTab(); await refreshAll(); } catch (err) { setOutput(tr('loginFailed', { error: err.message }), 'loginOutput'); } }
    function logoutAdmin() { localStorage.removeItem(adminTokenKey); localStorage.removeItem(adminProfileKey); setAuthState(false); }
    async function manualBind() { try { const email = document.getElementById('bindEmail').value.trim(); const data = await api('/api/admin/users/manual-bind', { method: 'POST', body: JSON.stringify({ email }) }); const msg = tr('bindDone', { email: data.user?.email || email, sn: data.user?.sn || tr('na') }); setOutput(msg); showToast(msg, 'success'); await Promise.all([loadBoundUsers(), loadMachines()]); } catch (err) { const msg = tr('bindFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function loadBoundUsers() { try { const data = await api('/api/admin/users'); renderBoundUsers(data.users || []); } catch (err) { setOutput(tr('bindFailed', { error: err.message })); } }
    async function addBlockedEmail() { try { await api('/api/admin/blocklist', { method: 'POST', body: JSON.stringify({ email: document.getElementById('blockedEmail').value.trim(), reason: document.getElementById('blockedReason').value.trim() }) }); setOutput(tr('blockedAdded')); await loadBlockedEmails(); } catch (err) { setOutput(tr('blockedAddFailed', { error: err.message })); } }
    async function loadBlockedEmails() { try { const data = await api('/api/admin/blocklist'); renderBlockedEmails(data.blocked_emails || []); } catch (err) { setOutput(tr('blockedLoadFailed', { error: err.message })); } }
    async function addInvite() { try { await api('/api/admin/invites', { method: 'POST', body: JSON.stringify({ email: document.getElementById('inviteEmail').value.trim(), role: document.getElementById('inviteRole').value }) }); setOutput(tr('inviteCreated')); await loadInvites(); } catch (err) { setOutput(tr('inviteAddFailed', { error: err.message })); } }
    async function loadInvites() { try { const data = await api('/api/admin/invites'); renderInvites(data.invites || []); } catch (err) { setOutput(tr('inviteLoadFailed', { error: err.message })); } }
    async function saveCenterConfig() { try { const data = await api('/api/admin/center/config', { method: 'POST', body: JSON.stringify({ base_url: document.getElementById('centerBaseURL').value.trim(), visibility: document.getElementById('centerVisibility').value, enrollment_mode: document.getElementById('centerEnrollmentMode').value }) }); renderCenterStatus(data); const msg = tr('centerSaved'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = tr('centerSaveFailed', { error: err.message }); setOutput(msg); showToast(msg, 'error'); } }
    async function registerWithCenter() { try { const data = await api('/api/admin/center/register', { method: 'POST', body: JSON.stringify({}) }); renderCenterStatus(data); const msg = tr('centerRegisteredMsg'); setOutput(msg); showToast(msg, 'success'); } catch (err) { const msg = tr('centerRegisterFailed', { error: err.message }); document.getElementById('centerStatusDetail').textContent = msg; document.getElementById('centerStatusDetailTab').textContent = msg; document.getElementById('centerRegisteredNotice').classList.add('hidden'); document.getElementById('centerRegisterActions').classList.remove('hidden'); setOutput(msg); showToast(msg, 'error'); } }
    async function loadCenterStatus() { try { const data = await api('/api/admin/center/status'); renderCenterStatus(data); } catch (err) { setOutput(tr('centerLoadFailed', { error: err.message })); } }
    async function loadMachines() { try { const scope = document.getElementById('bindEmail').value.trim(); let path = '/api/admin/debug/machines'; if (scope) { const user = await lookupScopedUser(scope); if (!user || !user.id) throw new Error(tr('noHubUser', { email: scope })); path = `/api/admin/debug/machines?user_id=${encodeURIComponent(user.id)}`; } const data = await api(path); renderMachineList(data.machines || []); } catch (err) { setOutput(tr('machinesLoadFailed', { error: err.message })); } }
    async function sendTestMail() { try { const email = document.getElementById('testMailEmail').value.trim(); const data = await api('/api/admin/mail/test', { method: 'POST', body: JSON.stringify({ email }) }); setOutput(data.message || tr('mailSent')); } catch (err) { setOutput(tr('mailFailed', { error: err.message })); } }
    async function changeAdminPassword() { const currentPassword = document.getElementById('currentPasswordInput').value; const newPassword = document.getElementById('newPasswordInput').value; const confirmPassword = document.getElementById('confirmPasswordInput').value; if (!currentPassword || !newPassword) { const msg = tr('requestFailed'); setOutput(msg); showToast(msg, 'error'); return; } if (newPassword !== confirmPassword) { const msg = ptr('mismatch'); setOutput(msg); showToast(msg, 'error'); return; } try { const data = await api('/api/admin/password', { method: 'POST', body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }) }); if (data.access_token) localStorage.setItem(adminTokenKey, data.access_token); if (data.admin) localStorage.setItem(adminProfileKey, JSON.stringify(data.admin)); document.getElementById('currentPasswordInput').value = ''; document.getElementById('newPasswordInput').value = ''; document.getElementById('confirmPasswordInput').value = ''; refreshAdminHeader(); const msg = ptr('changed'); setOutput(msg); showToast(msg, 'success'); } catch (err) { setOutput(err.message); showToast(err.message, 'error'); } }
    async function refreshAll() { await Promise.all([loadCenterStatus(), loadBlockedEmails(), loadInvites(), loadBoundUsers(), loadMachines()]); }
    applyI18n(); if (token()) { setAuthState(true); restoreTab(); refreshAll(); } else { setAuthState(false); refreshAuthStage(); }
  </script>
</body>
</html>
