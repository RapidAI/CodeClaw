<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dangbei API 管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .tab {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .panel-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #ef4444;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-success {
            background: #10b981;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-textarea {
            min-height: 150px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        
        .form-hint {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
        
        .accounts-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .accounts-table th,
        .accounts-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .accounts-table th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        
        .accounts-table tr:hover {
            background: #f9fafb;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }
        
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-unknown {
            background: #e5e7eb;
            color: #374151;
        }
        
        .token-display {
            font-family: 'Courier New', monospace;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Dangbei API 管理面板</h1>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('accounts')">账号管理</button>
            <button class="tab" onclick="switchTab('status')">服务状态</button>
        </div>
        
        <!-- 账号管理标签页 -->
        <div id="tab-accounts" class="tab-content active">
            <div class="cards">
                <div class="card">
                    <div class="card-title">总账号数</div>
                    <div class="card-value" id="total-accounts">-</div>
                </div>
                <div class="card">
                    <div class="card-title">活跃账号</div>
                    <div class="card-value" style="color: #10b981;" id="active-accounts">-</div>
                </div>
                <div class="card">
                    <div class="card-title">失效账号</div>
                    <div class="card-value" style="color: #ef4444;" id="failed-accounts">-</div>
                </div>
                <div class="card">
                    <div class="card-title">未知状态</div>
                    <div class="card-value" style="color: #6b7280;" id="unknown-accounts">-</div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">➕ 添加账号</div>
                </div>
                
                <div id="add-account-alert"></div>
                
                <form id="add-account-form" onsubmit="addAccount(event)">
                    <div class="form-group">
                        <label class="form-label">账号名称</label>
                        <input type="text" class="form-input" id="account-name" placeholder="例如：主账号、备用账号" required>
                        <div class="form-hint">给账号起个容易识别的名字</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Cookie 字符串</label>
                        <textarea class="form-input form-textarea" id="account-cookie" placeholder="粘贴 document.cookie 的完整输出..." required></textarea>
                        <div class="form-hint">
                            在浏览器控制台运行 <code>document.cookie</code>，然后复制完整输出粘贴到这里
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success">添加账号</button>
                </form>
            </div>
            
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📋 账号列表</div>
                    <button class="btn" onclick="loadAccounts()">刷新</button>
                </div>
                
                <div id="accounts-container">
                    <div class="loading">
                        <div class="spinner"></div> 加载中...
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 服务状态标签页 -->
        <div id="tab-status" class="tab-content">
            <div class="cards">
                <div class="card">
                    <div class="card-title">服务状态</div>
                    <div class="card-value" id="service-status">
                        <span class="spinner"></span>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">总请求数</div>
                    <div class="card-value" id="total-requests">-</div>
                </div>
                
                <div class="card">
                    <div class="card-title">成功率</div>
                    <div class="card-value" id="success-rate">-</div>
                </div>
                
                <div class="card">
                    <div class="card-title">平均响应</div>
                    <div class="card-value" id="avg-response">-</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tabName) {
            // 切换标签按钮状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 切换内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById('tab-' + tabName).classList.add('active');
            
            // 加载对应数据
            if (tabName === 'accounts') {
                loadAccounts();
            } else if (tabName === 'status') {
                checkServiceStatus();
            }
        }
        
        async function loadAccounts() {
            const container = document.getElementById('accounts-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div> 加载中...</div>';
            
            try {
                const response = await fetch('/api/accounts');
                const data = await response.json();
                
                // 更新统计卡片
                document.getElementById('total-accounts').textContent = data.stats.total || 0;
                document.getElementById('active-accounts').textContent = data.stats.active || 0;
                document.getElementById('failed-accounts').textContent = data.stats.failed || 0;
                document.getElementById('unknown-accounts').textContent = data.stats.unknown || 0;
                
                if (data.accounts && data.accounts.length > 0) {
                    let html = '<table class="accounts-table">';
                    html += '<thead><tr>';
                    html += '<th>名称</th>';
                    html += '<th>Token</th>';
                    html += '<th>状态</th>';
                    html += '<th>最后使用</th>';
                    html += '<th>错误次数</th>';
                    html += '<th>操作</th>';
                    html += '</tr></thead><tbody>';
                    
                    data.accounts.forEach(acc => {
                        const statusClass = acc.status === 'active' ? 'status-active' : 
                                          acc.status === 'failed' ? 'status-failed' : 'status-unknown';
                        const statusText = acc.status === 'active' ? '活跃' : 
                                         acc.status === 'failed' ? '失效' : '未知';
                        const lastUsed = acc.lastUsed ? new Date(acc.lastUsed).toLocaleString('zh-CN') : '从未使用';
                        const maskedToken = maskToken(acc.token);
                        
                        html += '<tr>';
                        html += `<td><strong>${acc.name}</strong></td>`;
                        html += `<td><span class="token-display">${maskedToken}</span></td>`;
                        html += `<td><span class="status-badge ${statusClass}">${statusText}</span></td>`;
                        html += `<td>${lastUsed}</td>`;
                        html += `<td>${acc.errorCount || 0}</td>`;
                        html += `<td>
                            <button class="btn" onclick="testAccount('${acc.token}')">测试</button>
                            <button class="btn btn-danger" onclick="deleteAccount('${acc.token}')">删除</button>
                        </td>`;
                        html += '</tr>';
                    });
                    
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>还没有账号</h3>
                            <p>请在上方添加第一个账号</p>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        加载失败: ${error.message}
                    </div>
                `;
            }
        }
        
        async function addAccount(event) {
            event.preventDefault();
            
            const name = document.getElementById('account-name').value;
            const cookie = document.getElementById('account-cookie').value;
            const alertDiv = document.getElementById('add-account-alert');
            
            try {
                const response = await fetch('/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, cookie })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alertDiv.innerHTML = '<div class="alert alert-success">✅ 账号添加成功！</div>';
                    document.getElementById('add-account-form').reset();
                    setTimeout(() => { alertDiv.innerHTML = ''; }, 3000);
                    loadAccounts();
                } else {
                    alertDiv.innerHTML = `<div class="alert alert-error">❌ ${data.error || '添加失败'}</div>`;
                }
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-error">❌ 网络错误: ${error.message}</div>`;
            }
        }
        
        async function deleteAccount(token) {
            if (!confirm('确定要删除这个账号吗？')) return;
            
            try {
                const response = await fetch('/api/accounts', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                if (response.ok) {
                    loadAccounts();
                } else {
                    const data = await response.json();
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('网络错误: ' + error.message);
            }
        }
        
        async function testAccount(token) {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '测试中...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/accounts/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert('✅ 测试成功！账号可用\n响应时间: ' + data.responseTime + 'ms');
                    loadAccounts(); // 刷新列表显示最新状态
                } else {
                    alert('❌ 测试失败\n' + (data.error || '账号不可用'));
                    loadAccounts();
                }
            } catch (error) {
                alert('❌ 测试失败: ' + error.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        function maskToken(token) {
            if (!token || token.length <= 8) return '****';
            return token.substring(0, 4) + '****' + token.substring(token.length - 4);
        }
        
        async function checkServiceStatus() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('service-status').innerHTML = 
                        '<span style="color: #10b981;">● 运行中</span>';
                    
                    if (data.stats) {
                        document.getElementById('total-requests').textContent = 
                            data.stats.totalRequests || 0;
                        document.getElementById('success-rate').textContent = 
                            data.stats.successRate || '100%';
                        document.getElementById('avg-response').textContent = 
                            (data.stats.avgResponse || '-') + 'ms';
                    }
                }
            } catch (error) {
                document.getElementById('service-status').innerHTML = 
                    '<span style="color: #ef4444;">● 离线</span>';
            }
        }
        
        // 初始化
        loadAccounts();
        setInterval(loadAccounts, 30000); // 每30秒刷新账号列表
    </script>
</body>
</html>
