<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🦞 龙虾盛宴 — SkillHub</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#1a202c;--muted:#64748b;--primary:#2563eb;--primary-light:#eff6ff;--border:#e2e8f0;--star:#f59e0b;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;line-height:1.6}
    .container{max-width:1200px;margin:0 auto;padding:24px 20px}
    header{text-align:center;padding:32px 0 24px}
    header h1{font-size:28px;margin-bottom:6px}
    header p{color:var(--muted);font-size:14px}
    .search-bar{display:flex;gap:8px;max-width:600px;margin:20px auto 0}
    .search-bar input{flex:1;height:42px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;font-size:14px;outline:none;transition:border-color .2s}
    .search-bar input:focus{border-color:var(--primary)}
    .search-bar button{height:42px;padding:0 20px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font:inherit;font-weight:600;cursor:pointer}
    .search-bar button:disabled{opacity:.6;cursor:default}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s}
    .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .card-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
    .card-desc{font-size:13px;color:var(--muted);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-tags{display:flex;flex-wrap:wrap;gap:4px}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;background:#f1f5f9;color:#475569;border:1px solid var(--border)}
    .card-footer{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:auto;padding-top:8px;border-top:1px solid #f1f5f9}
    .stars{color:var(--star);letter-spacing:1px}
    .trust-badge{display:inline-block;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:600}
    .trust-community{background:#eff6ff;color:#2563eb;border:1px solid #93c5fd}
    .trust-official{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
    .trust-unknown{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
    .pager{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:24px;padding:16px 0}
    .pager button{height:36px;padding:0 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font:inherit;cursor:pointer}
    .pager button:disabled{opacity:.4;cursor:default}
    .pager span{font-size:13px;color:var(--muted)}
    .empty{text-align:center;padding:48px 0;color:var(--muted);font-size:14px}
    .loading{text-align:center;padding:48px 0;color:var(--muted);font-size:14px}
    @media(max-width:960px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:560px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🦞 龙虾盛宴</h1>
      <p>MaClaw SkillHub — 搜索、发现、分享 Skill</p>
    </header>
    <div class="search-bar">
      <input id="searchInput" placeholder="搜索 Skill 名称、描述、标签..." autofocus>
      <button id="searchBtn" onclick="doSearch(1)">搜索</button>
    </div>
    <div id="content"><div class="empty">输入关键词搜索，或直接点击搜索浏览全部 Skill</div></div>
    <div id="pager" class="pager" style="display:none">
      <button id="prevBtn" onclick="doSearch(currentPage-1)">上一页</button>
      <span id="pageInfo"></span>
      <button id="nextBtn" onclick="doSearch(currentPage+1)">下一页</button>
    </div>
  </div>
<script>
var currentPage = 1;
var pageSize = 40;

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch(1);
});

function doSearch(page) {
  if (page < 1) return;
  currentPage = page;
  var q = document.getElementById('searchInput').value.trim();
  var url = '/api/v1/skills/search?page=' + page + '&q=' + encodeURIComponent(q);
  document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('searchBtn').disabled = true;

  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    document.getElementById('searchBtn').disabled = false;
    var skills = data.skills || [];
    var total = data.total || 0;
    if (skills.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty">没有找到匹配的 Skill</div>';
      document.getElementById('pager').style.display = 'none';
      return;
    }
    var totalPages = Math.ceil(total / pageSize);
    var html = '<div class="grid">';
    for (var i = 0; i < skills.length; i++) {
      var s = skills[i];
      html += renderCard(s);
    }
    html += '</div>';
    document.getElementById('content').innerHTML = html;
    document.getElementById('pager').style.display = 'flex';
    document.getElementById('pageInfo').textContent = '第 ' + page + ' / ' + totalPages + ' 页 (共 ' + total + ' 个)';
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= totalPages;
  }).catch(function(err) {
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('content').innerHTML = '<div class="empty">加载失败: ' + escapeHtml(String(err)) + '</div>';
  });
}

function renderCard(s) {
  var trustClass = 'trust-' + (s.trust_level || 'unknown');
  var trustLabel = s.trust_level === 'official' ? '官方' : s.trust_level === 'community' ? '社区' : '未知';
  var stars = renderStars(s.avg_rating || 0);
  var ratingText = s.rating_count > 0 ? ' (' + (s.avg_rating || 0).toFixed(1) + ', ' + s.rating_count + '评)' : '';
  var tags = '';
  if (s.tags && s.tags.length > 0) {
    tags = '<div class="card-tags">';
    for (var j = 0; j < s.tags.length && j < 4; j++) {
      tags += '<span class="tag">' + escapeHtml(s.tags[j]) + '</span>';
    }
    tags += '</div>';
  }
  return '<div class="card">' +
    '<div class="card-name">' + escapeHtml(s.name) + ' <span class="trust-badge ' + trustClass + '">' + trustLabel + '</span></div>' +
    '<div class="card-desc">' + escapeHtml(s.description || '暂无描述') + '</div>' +
    tags +
    '<div class="card-footer"><span class="stars">' + stars + ratingText + '</span><span>⬇ ' + formatDL(s.downloads || 0) + '</span></div>' +
    '</div>';
}

function renderStars(avg) {
  var full = Math.round(avg);
  var s = '';
  for (var i = 1; i <= 5; i++) s += i <= full ? '★' : '☆';
  return s;
}

function formatDL(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function escapeHtml(s) {
  if (!s) return '';
  var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return String(s).replace(/[&<>"']/g, function(c) { return m[c]; });
}
</script>
</body>
</html>
