<!doctype html>
<html lang="zh-CN" id="html-root">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>龙虾盛宴 SkillMarket</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#1a202c;--muted:#64748b;--primary:#2563eb;--primary-light:#eff6ff;--border:#e2e8f0;--danger:#dc2626;--success:#16a34a;--warn:#f59e0b;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;line-height:1.6;font-size:14px}
    .container{max-width:1100px;margin:0 auto;padding:20px}
    header{text-align:center;padding:24px 0 16px;position:relative}
    header h1{font-size:24px}
    header p{color:var(--muted);font-size:13px}
    .user-link{position:absolute;right:0;top:28px;font-size:13px;color:var(--primary);text-decoration:none}
    .user-link:hover{text-decoration:underline}
    .search-bar{display:flex;gap:8px;margin-bottom:20px}
    .search-bar input{flex:1;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:8px;font:inherit;font-size:14px}
    .search-bar select{height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;font:inherit;font-size:13px}
    .btn{padding:6px 14px;border:none;border-radius:6px;font:inherit;font-size:12px;cursor:pointer;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff}
    .tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px}
    .tab{padding:8px 18px;cursor:pointer;border:none;background:none;font:inherit;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
    .tab:hover{color:var(--text)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
    .card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
    .card-name{font-size:15px;font-weight:600;margin-bottom:4px}
    .card-desc{font-size:12px;color:var(--muted);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap;align-items:center}
    .card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:var(--primary-light);color:var(--primary)}
    .star{color:var(--warn)}
    .empty{text-align:center;padding:48px;color:var(--muted)}
    .detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:center}
    .detail-overlay.active{display:flex}
    .detail-box{background:var(--card);border-radius:var(--radius);padding:24px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
    .detail-box h2{font-size:18px;margin-bottom:8px}
    .detail-close{float:right;cursor:pointer;font-size:18px;color:var(--muted);background:none;border:none}
    .rating-row{display:flex;gap:6px;margin:12px 0}
    .rating-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;transition:.2s}
    .rating-btn:hover,.rating-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🦞 龙虾盛宴 SkillMarket</h1>
    <p id="subtitle">发现优质 Skill · 搜索 · 排行榜</p>
    <a class="user-link" href="/skillmarket/user" id="user-link">用户中心 →</a>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="search" id="tab-search">搜索</button>
    <button class="tab" data-view="top-rating" id="tab-rating">评分排行</button>
    <button class="tab" data-view="top-downloads" id="tab-downloads">下载排行</button>
    <button class="tab" data-view="top-newest" id="tab-newest">最新上架</button>
  </div>

  <div id="view-search">
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="搜索 Skill 名称、描述、标签…">
      <button class="btn btn-primary" onclick="doSearch()" id="search-btn">搜索</button>
    </div>
    <div class="grid" id="search-results"></div>
    <p class="empty" id="search-empty" style="display:none">暂无搜索结果</p>
  </div>

  <div id="view-top-rating" style="display:none">
    <div class="grid" id="top-rating-list"></div>
    <p class="empty" id="top-rating-empty" style="display:none">暂无数据</p>
  </div>

  <div id="view-top-downloads" style="display:none">
    <div class="grid" id="top-downloads-list"></div>
    <p class="empty" id="top-downloads-empty" style="display:none">暂无数据</p>
  </div>

  <div id="view-top-newest" style="display:none">
    <div class="grid" id="top-newest-list"></div>
    <p class="empty" id="top-newest-empty" style="display:none">暂无数据</p>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-box">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <h2 id="detail-name"></h2>
    <div class="card-tags" id="detail-tags"></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px" id="detail-desc"></p>
    <div class="card-meta" style="font-size:13px;margin-bottom:12px">
      <span>⭐ <span id="detail-rating">-</span></span>
      <span>📥 <span id="detail-downloads">0</span></span>
      <span>💰 <span id="detail-price">-</span></span>
      <span id="detail-status-wrap" style="display:none">状态: <span id="detail-status"></span></span>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:12px">
      <p style="font-size:13px;margin-bottom:8px" id="rate-label">评分（-2 到 +2）：</p>
      <div class="rating-row" id="rating-row"></div>
      <p style="font-size:12px;color:var(--muted)" id="rate-msg"></p>
    </div>
  </div>
</div>

<script>
const API = '';
const LANG = (navigator.language || 'zh').startsWith('zh') ? 'zh' : 'en';
document.getElementById('html-root').lang = LANG === 'zh' ? 'zh-CN' : 'en';

const I18N = {
  'subtitle':       { zh: '发现优质 Skill · 搜索 · 排行榜', en: 'Discover Skills · Search · Leaderboard' },
  'user-link':      { zh: '用户中心 →', en: 'User Center →' },
  'tab.search':     { zh: '搜索', en: 'Search' },
  'tab.rating':     { zh: '评分排行', en: 'Top Rated' },
  'tab.downloads':  { zh: '下载排行', en: 'Most Downloaded' },
  'tab.newest':     { zh: '最新上架', en: 'Newest' },
  'search.placeholder': { zh: '搜索 Skill 名称、描述、标签…', en: 'Search skill name, description, tags…' },
  'search.btn':     { zh: '搜索', en: 'Search' },
  'search.empty':   { zh: '暂无搜索结果', en: 'No results found.' },
  'top.empty':      { zh: '暂无数据', en: 'No data.' },
  'rate.label':     { zh: '评分（-2 到 +2）：', en: 'Rate (-2 to +2):' },
  'rate.ok':        { zh: '评分成功', en: 'Rating submitted.' },
  'rate.needEmail': { zh: '请输入邮箱后评分', en: 'Enter your email to rate.' },
  'price.free':     { zh: '免费', en: 'Free' },
  'err.network':    { zh: '网络错误', en: 'Network error.' },
};
function t(key) { return (I18N[key] && I18N[key][LANG]) || key; }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// i18n 初始化
(function applyI18n() {
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('user-link').textContent = t('user-link');
  document.getElementById('tab-search').textContent = t('tab.search');
  document.getElementById('tab-rating').textContent = t('tab.rating');
  document.getElementById('tab-downloads').textContent = t('tab.downloads');
  document.getElementById('tab-newest').textContent = t('tab.newest');
  document.getElementById('search-input').placeholder = t('search.placeholder');
  document.getElementById('search-btn').textContent = t('search.btn');
  document.getElementById('search-empty').textContent = t('search.empty');
  document.getElementById('rate-label').textContent = t('rate.label');
  document.querySelectorAll('[id$="-empty"]').forEach(el => {
    if (el.id !== 'search-empty') el.textContent = t('top.empty');
  });
})();

// Tab 切换
const views = ['search','top-rating','top-downloads','top-newest'];
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');
    const v = tab.dataset.view;
    views.forEach(id => {
      document.getElementById('view-' + id).style.display = id === v ? '' : 'none';
    });
    if (v === 'top-rating') loadTop('rating');
    if (v === 'top-downloads') loadTop('downloads');
    if (v === 'top-newest') loadTop('newest');
  });
});

// 搜索
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  try {
    const r = await fetch(API + '/api/v1/skillmarket/search?q=' + encodeURIComponent(q) + '&top_n=30');
    if (!r.ok) return;
    const data = await r.json();
    const list = data.results || data || [];
    renderCards('search-results', 'search-empty', Array.isArray(list) ? list : []);
  } catch(e) {}
}

// 排行榜
async function loadTop(sortBy) {
  const key = 'top-' + sortBy;
  try {
    const r = await fetch(API + '/api/v1/skillmarket/top?sort=' + sortBy + '&limit=20');
    if (!r.ok) return;
    const data = await r.json();
    const list = data.entries || data || [];
    renderCards(key + '-list', key + '-empty', Array.isArray(list) ? list : []);
  } catch(e) {}
}

function renderCards(containerId, emptyId, items) {
  const container = document.getElementById(containerId);
  const empty = document.getElementById(emptyId);
  container.innerHTML = '';
  if (!items.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  items.forEach(s => {
    const tags = (s.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
    const rating = (s.avg_rating || 0).toFixed(1);
    const price = s.price ? s.price + ' Credits' : t('price.free');
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div class="card-name">${esc(s.name)}</div>
      <div class="card-desc">${esc(s.description || '')}</div>
      <div class="card-tags">${tags}</div>
      <div class="card-meta">
        <span class="star">⭐ ${rating}</span>
        <span>📥 ${s.download_count || 0}</span>
        <span>💰 ${esc(price)}</span>
      </div>`;
    card.onclick = () => showDetail(s);
    container.appendChild(card);
  });
}

// 详情弹窗
let currentSkillID = '';

function showDetail(s) {
  currentSkillID = s.id;
  document.getElementById('detail-name').textContent = s.name;
  document.getElementById('detail-desc').textContent = s.description || '';
  document.getElementById('detail-rating').textContent = (s.avg_rating || 0).toFixed(1);
  document.getElementById('detail-downloads').textContent = s.download_count || 0;
  document.getElementById('detail-price').textContent = s.price ? s.price + ' Credits' : t('price.free');
  if (s.status) {
    document.getElementById('detail-status-wrap').style.display = '';
    document.getElementById('detail-status').textContent = s.status;
  } else {
    document.getElementById('detail-status-wrap').style.display = 'none';
  }
  const tagsEl = document.getElementById('detail-tags');
  tagsEl.innerHTML = (s.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');

  // 评分按钮
  const row = document.getElementById('rating-row');
  row.innerHTML = '';
  [-2,-1,0,1,2].forEach(score => {
    const btn = document.createElement('button');
    btn.className = 'rating-btn';
    btn.textContent = score > 0 ? '+' + score : String(score);
    btn.onclick = () => submitRating(s.id, score);
    row.appendChild(btn);
  });
  document.getElementById('rate-msg').textContent = '';
  document.getElementById('detail-overlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('active');
}

document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

async function submitRating(skillID, score) {
  const email = prompt(t('rate.needEmail'));
  if (!email) return;
  try {
    const r = await fetch(API + '/api/v1/skillmarket/' + skillID + '/rate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, score})
    });
    if (!r.ok) {
      const body = await r.text();
      document.getElementById('rate-msg').textContent = body;
      return;
    }
    document.getElementById('rate-msg').textContent = t('rate.ok');
    document.querySelectorAll('.rating-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.textContent === (score > 0 ? '+' + score : String(score)));
    });
  } catch(e) {
    document.getElementById('rate-msg').textContent = t('err.network');
  }
}

// 初始加载：搜索全部
doSearch();
</script>
</body>
</html>
