<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeClaw Hub Center Admin</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--soft:#f8fbff;--text:#172133;--muted:#6f7d95;--line:rgba(20,33,54,.1);--primary:#0f62fe;--ok:#0f9960;--warn:#c57a08;--danger:#c0392b}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%)}
    .hidden{display:none!important}.shell{padding:24px}.card{background:rgba(255,255,255,.95);border:1px solid rgba(20,33,54,.08);border-radius:24px;box-shadow:0 20px 60px rgba(19,33,58,.12)}

    .hero{padding:36px;background:linear-gradient(160deg,#0d1b3a 0%,#184aa8 60%,#0f62fe 100%);color:#fff}.hero h1{margin:16px 0 10px;font-size:34px}.hero p,.hero li{color:rgba(255,255,255,.84);line-height:1.7}
    .mini{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(15,98,254,.12);color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .form{padding:30px;display:flex;flex-direction:column;gap:14px;justify-content:center}.form h2{margin:0;font-size:28px}.subtle{color:var(--muted);line-height:1.6}
    .stage-toggle,.actions,.topbar,.lang-switch{display:flex;gap:10px;flex-wrap:wrap}.stage-toggle button{flex:1;min-width:160px}
    .stage-card{padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--soft)}
    label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px} input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);font:inherit}
    button{border:0;border-radius:12px;padding:10px 15px;font:inherit;font-weight:700;cursor:pointer}.btn-primary{background:linear-gradient(135deg,#0f62fe,#2187ff);color:#fff}.btn-secondary{background:#edf3ff;color:#1a49aa}.btn-danger{background:#fff0ed;color:var(--danger)}.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
    .console{min-height:150px;max-height:280px;overflow:auto;white-space:pre-wrap;border-radius:16px;border:1px solid #0f172a;background:#101a31;color:#d7e3ff;padding:14px;font-family:Consolas,monospace;font-size:12px;line-height:1.7}
    .app{min-height:100vh;display:grid;grid-template-columns:270px 1fr}.side{background:linear-gradient(180deg,#0f1b34 0%,#16284b 100%);color:#fff;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
    .brand h1{margin:12px 0 6px;font-size:28px}.brand p{margin:0;color:rgba(255,255,255,.72);font-size:14px;line-height:1.6}
    .nav{display:grid;gap:8px}.nav button{text-align:left;background:transparent;color:rgba(255,255,255,.82);border:1px solid transparent;padding:12px 14px;border-radius:14px}.nav button.active{background:rgba(255,255,255,.1);color:#fff}.nav small{display:block;margin-top:4px;color:rgba(255,255,255,.56)}
    .main{padding:24px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar{align-items:center}
    .lang-switch{padding:4px;border-radius:999px;background:#fff;border:1px solid var(--line)}.lang-switch button{padding:8px 12px;border-radius:999px;background:transparent;color:var(--muted)}.lang-switch button.active{background:var(--primary);color:#fff}
    .admin-chip{padding:10px 14px;border-radius:14px;background:#fff;border:1px solid var(--line)}.admin-chip strong{display:block;font-size:14px}.admin-chip span{display:block;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;text-transform:uppercase}.ok{background:rgba(15,153,96,.12);color:var(--ok)}.warn{background:rgba(197,122,8,.12);color:var(--warn)}.danger{background:rgba(192,57,43,.12);color:var(--danger)}.info{background:rgba(15,98,254,.12);color:var(--primary)}
    .hint,.item,.metric{padding:18px;border-radius:18px;background:var(--panel);border:1px solid var(--line)}.hint{background:rgba(15,23,42,.04);border-style:dashed}.item-meta,.desc,.hint,.metric span{color:var(--muted);font-size:13px;line-height:1.6}
    .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric label{font-size:12px;text-transform:uppercase;letter-spacing:.08em}.metric strong{display:block;font-size:28px;line-height:1;margin:8px 0 6px}
    .panel{display:none;padding:22px}.panel.active{display:block}.head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}.head h3{margin:0;font-size:22px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.list{display:grid;gap:12px}#hubs.list{grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.hub-card{display:flex;flex-direction:column;min-height:100%}.hub-card .item-meta{flex:1}.hub-card .actions{margin-top:16px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px}.item-title{font-weight:700;font-size:15px}.mono{font-family:Consolas,monospace;font-size:12px;word-break:break-all}
    .toast-stack{position:fixed;top:18px;right:18px;z-index:9999;display:grid;gap:10px;max-width:min(360px,calc(100vw - 36px))}.toast{padding:14px 16px;border-radius:16px;background:#14213d;color:#fff;box-shadow:0 16px 36px rgba(15,23,42,.22);border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(-8px);transition:opacity .18s ease,transform .18s ease}.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:#0f6d4b}.toast.error{background:#9f2f24}.toast.info{background:#184aa8}
    @media (max-width:1080px){.app,.login-card{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}#hubs.list{grid-template-columns:repeat(2,minmax(0,1fr))}} @media (max-width:760px){.shell,.main{padding:18px}.metrics,.grid2,#hubs.list{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <div id="toastStack" class="toast-stack"></div>
  <div id="loginView" class="login shell">
    <div class="login-card card">
      <div class="hero">
        <div class="mini">CodeClaw Hub Center</div>
        <h1 data-i18n="loginHeroTitle"></h1>
        <p data-i18n="loginHeroDesc"></p>
        <ul><li data-i18n="loginBullet1"></li><li data-i18n="loginBullet2"></li><li data-i18n="loginBullet3"></li></ul>
      </div>
      <div class="form">
        <div class="mini" data-i18n="adminAccess"></div>
        <h2 data-i18n="loginTitle"></h2>
        <p class="subtle" id="authStageHint"></p>
        <div id="stageToggle" class="stage-toggle hidden"><button id="setupStageButton" class="btn-secondary" type="button" onclick="showAuthStage('setup')" data-i18n="firstSetup"></button><button id="loginStageButton" class="btn-ghost" type="button" onclick="showAuthStage('login')" data-i18n="adminLogin"></button></div>
        <div id="setupStage" class="stage-card hidden"><h3 data-i18n="firstSetup"></h3><p class="subtle" data-i18n="setupDesc"></p><div><label for="setupUsername" data-i18n="adminUsername"></label><input id="setupUsername" placeholder="admin"></div><div><label for="setupPassword" data-i18n="adminPassword"></label><input id="setupPassword" type="password"></div><div class="actions"><button class="btn-secondary" onclick="setupAdmin()" data-i18n="saveInit"></button></div></div>
        <div id="loginStage" class="stage-card hidden"><h3 data-i18n="adminLogin"></h3><p class="subtle" data-i18n="signinDesc"></p><div><label for="loginUsername" data-i18n="adminUsername"></label><input id="loginUsername" placeholder="admin"></div><div><label for="loginPassword" data-i18n="adminPassword"></label><input id="loginPassword" type="password"></div><div class="actions"><button class="btn-primary" onclick="loginAdmin()" data-i18n="signIn"></button></div></div>
        <div id="loginOutput" class="console"></div>
      </div>
    </div>
  </div>
  <div id="appView" class="app hidden">
    <aside class="side">
      <div class="brand"><div class="mini" style="background:rgba(255,255,255,.1);color:#fff">CodeClaw Hub Center</div><h1 data-i18n="brandTitle"></h1><p data-i18n="brandDesc"></p></div>
      <nav class="nav"><button data-tab="overview" class="active" onclick="openTab('overview')"><span data-i18n="navOverview"></span><small data-i18n="navOverviewDesc"></small></button><button data-tab="hubs" onclick="openTab('hubs')"><span data-i18n="navHubs"></span><small data-i18n="navHubsDesc"></small></button><button data-tab="policies" onclick="openTab('policies')"><span data-i18n="navPolicies"></span><small data-i18n="navPoliciesDesc"></small></button><button data-tab="console" onclick="openTab('console')"><span data-i18n="navConsole"></span><small data-i18n="navConsoleDesc"></small></button></nav>
      <div class="hint" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.74)"><span data-i18n="defaultEntry"></span><br><span class="mono">https://hubs.rapidai.tech</span></div>
    </aside>
    <main class="main">
      <div class="top"><div><h2 id="pageTitle"></h2><div class="subtle" id="pageSubtitle"></div></div><div class="topbar"><div class="lang-switch"><button type="button" data-lang="en" onclick="setLanguage('en')">EN</button><button type="button" data-lang="zh" onclick="setLanguage('zh')">中文</button></div><div class="admin-chip"><strong id="adminDisplayName"></strong><span id="adminDisplayMeta"></span></div><span id="authBadge" class="badge ok"></span><button class="btn-ghost" onclick="logoutAdmin()" data-i18n="logout"></button></div></div>
      <div class="metrics"><div class="metric"><label data-i18n="metricHubs"></label><strong id="hubCountHero">0</strong><span data-i18n="metricHubsHint"></span></div><div class="metric"><label data-i18n="metricBlockedEmails"></label><strong id="blockedEmailCountHero">0</strong><span data-i18n="metricBlockedEmailsHint"></span></div><div class="metric"><label data-i18n="metricBlockedIps"></label><strong id="blockedIPCountHero">0</strong><span data-i18n="metricBlockedIpsHint"></span></div></div>
      <section id="tab-overview" class="panel card active"><div class="head"><div><h3 data-i18n="overviewTitle"></h3><div class="desc" data-i18n="overviewDesc"></div></div><button class="btn-ghost" onclick="refreshAll()" data-i18n="refreshAll"></button></div><div class="grid2"><div class="hint" data-i18n="overviewHint"></div><div class="item"><div class="item-title" data-i18n="discoveryTitle"></div><div class="item-meta" data-i18n="discoveryDesc"></div><div class="mono" style="margin-top:8px;color:var(--text)">https://hubs.rapidai.tech</div></div></div></section>
      <section id="tab-hubs" class="panel card"><div class="head"><div><h3 data-i18n="hubsTitle"></h3><div class="desc" data-i18n="hubsDesc"></div></div><button class="btn-ghost" onclick="listHubs()" data-i18n="refreshHubs"></button></div><div id="hubs" class="list"><div class="hint" data-i18n="emptyHubs"></div></div></section>
      <section id="tab-policies" class="panel card"><div class="head"><div><h3 data-i18n="policiesTitle"></h3><div class="desc" data-i18n="policiesDesc"></div></div></div><div class="grid2"><div class="item"><label for="blockedEmail" data-i18n="blockedEmail"></label><input id="blockedEmail" placeholder="blocked@example.com"><label for="blockedEmailReason" style="margin-top:12px" data-i18n="reason"></label><input id="blockedEmailReason"><div class="actions"><button class="btn-danger" onclick="addBlockedEmail()" data-i18n="addEmailBlock"></button></div></div><div class="item"><label for="blockedIP" data-i18n="blockedIp"></label><input id="blockedIP" placeholder="203.0.113.10"><label for="blockedIPReason" style="margin-top:12px" data-i18n="reason"></label><input id="blockedIPReason"><div class="actions"><button class="btn-danger" onclick="addBlockedIP()" data-i18n="addIpBlock"></button></div></div></div><div class="grid2" style="margin-top:18px"><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="blockedEmailsTitle"></div><div class="item-meta" data-i18n="blockedEmailsDesc"></div></div><button class="btn-ghost" onclick="listBlockedEmails()" data-i18n="reload"></button></div><div id="blockedEmails" class="list"><div class="hint" data-i18n="emptyBlockedEmails"></div></div></div><div class="item"><div class="head" style="margin-bottom:12px"><div><div class="item-title" data-i18n="blockedIpsTitle"></div><div class="item-meta" data-i18n="blockedIpsDesc"></div></div><button class="btn-ghost" onclick="listBlockedIPs()" data-i18n="reload"></button></div><div id="blockedIPs" class="list"><div class="hint" data-i18n="emptyBlockedIps"></div></div></div></div><div class="item" style="margin-top:18px"><div class="item-title" id="passwordCardTitle"></div><div class="item-meta" id="passwordCardDesc" style="margin-bottom:12px"></div><div class="grid2"><div><label for="currentPasswordInput" id="currentPasswordLabel"></label><input id="currentPasswordInput" type="password"></div><div><label for="newPasswordInput" id="newPasswordLabel"></label><input id="newPasswordInput" type="password"></div></div><div style="margin-top:12px"><label for="confirmPasswordInput" id="confirmPasswordLabel"></label><input id="confirmPasswordInput" type="password"></div><div class="actions" style="margin-top:14px"><button class="btn-primary" onclick="changeAdminPassword()" id="changePasswordButton"></button></div></div></section>
      <section id="tab-console" class="panel card"><div class="head"><div><h3 data-i18n="consoleTitle"></h3><div class="desc" data-i18n="consoleDesc"></div></div><button class="btn-ghost" onclick="clearConsole()" data-i18n="clear"></button></div><div id="output" class="console"></div></section>
    </main>
  </div>

:'加载封禁 IP 失败：{error}'}}; 
    const tabMeta={overview:['overviewTabTitle','overviewTabSubtitle'],hubs:['hubsTabTitle','hubsTabSubtitle'],policies:['policiesTabTitle','policiesTabSubtitle'],console:['consoleTabTitle','consoleTabSubtitle']};
    const PASSWORD_I18N={en:{title:'Change Password',desc:'Update the administrator password without leaving the console.',current:'Current password',next:'New password',confirm:'Confirm new password',action:'Update Password',mismatch:'The new password confirmation does not match.',changed:'Administrator password updated.'},zh:{title:'修改密码',desc:'直接在后台更新管理员密码，无需离开当前控制台。',current:'当前密码',next:'新密码',confirm:'确认新密码',action:'更新密码',mismatch:'两次输入的新密码不一致。',changed:'管理员密码已更新。'}};
    let adminInitialized=null;
    let currentLang=(()=>{const saved=localStorage.getItem(langKey);if(saved==='en'||saved==='zh')return saved;const langs=navigator.languages||[navigator.language||'en'];return langs.some(v=>String(v).toLowerCase().startsWith('zh'))?'zh':'en';})();
    const tr=(key,vars={})=>(I18N[currentLang][key]||I18N.en[key]||key).replace(/\{(\w+)\}/g,(_,n)=>vars[n]??'');
    const ptr=key=>(PASSWORD_I18N[currentLang]||PASSWORD_I18N.en)[key]||PASSWORD_I18N.en[key]||key;
    function applyI18n(){document.title=tr('title');document.documentElement.lang=currentLang==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=tr(el.dataset.i18n));document.getElementById('authStageHint').textContent=tr('checking');document.getElementById('loginOutput').textContent=tr('loginReady');document.getElementById('output').textContent=tr('outputReady');document.getElementById('setupPassword').placeholder=tr('adminPassword');document.getElementById('loginPassword').placeholder=tr('adminPassword');document.getElementById('blockedEmailReason').placeholder=tr('reason');document.getElementById('blockedIPReason').placeholder=tr('reason');document.getElementById('passwordCardTitle').textContent=ptr('title');document.getElementById('passwordCardDesc').textContent=ptr('desc');document.getElementById('currentPasswordLabel').textContent=ptr('current');document.getElementById('newPasswordLabel').textContent=ptr('next');document.getElementById('confirmPasswordLabel').textContent=ptr('confirm');document.getElementById('currentPasswordInput').placeholder=ptr('current');document.getElementById('newPasswordInput').placeholder=ptr('next');document.getElementById('confirmPasswordInput').placeholder=ptr('confirm');document.getElementById('changePasswordButton').textContent=ptr('action');document.querySelectorAll('.lang-switch button').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===currentLang));}
    function setLanguage(lang){currentLang=lang==='zh'?'zh':'en';localStorage.setItem(langKey,currentLang);applyI18n();restoreTab();refreshAdminHeader();}
    function token(){return localStorage.getItem(adminTokenKey)||''} function adminProfile(){try{return JSON.parse(localStorage.getItem(adminProfileKey)||'null')}catch(_){return null}}
    function setOutput(message,target='output'){const stamp=new Date().toLocaleTimeString();const el=document.getElementById(target);el.textContent='['+stamp+'] '+message+'\n'+el.textContent}
    function showToast(message,type='info'){const root=document.getElementById('toastStack');const toast=document.createElement('div');toast.className='toast '+(type||'info');toast.textContent=message;root.appendChild(toast);requestAnimationFrame(()=>toast.classList.add('show'));const cleanup=()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),180)};setTimeout(cleanup,3200);toast.addEventListener('click',cleanup,{once:true})}
    function clearConsole(){document.getElementById('output').textContent=tr('outputReady')}
    async function api(path,options={}){const opts={...options,headers:{'Content-Type':'application/json',...(options.headers||{})}};if(token())opts.headers.Authorization='Bearer '+token();let res;try{res=await fetch(path,opts)}catch(_){throw new Error(tr('networkUnavailable'))}let data={};try{data=await res.json()}catch(_){}if(!res.ok){if(res.status===401&&data.code==='ADMIN_UNAUTHORIZED'){localStorage.removeItem(adminTokenKey);localStorage.removeItem(adminProfileKey);showApp(false);const msg=tr('sessionExpired');document.getElementById('loginOutput').textContent=msg;showToast(msg,'error');throw new Error(msg)}throw new Error(data.message||res.statusText||tr('requestFailed'))}return data}
    async function loadAdminStatus(){return api('/api/admin/status')}
    function showAuthStage(stage){const setup=stage==='setup';document.getElementById('setupStage').classList.toggle('hidden',!setup);document.getElementById('loginStage').classList.toggle('hidden',setup);document.getElementById('setupStageButton').className=setup?'btn-secondary':'btn-ghost';document.getElementById('loginStageButton').className=setup?'btn-ghost':'btn-secondary'}
    function setSetupAvailability(enabled){document.getElementById('stageToggle').classList.toggle('hidden',!enabled);document.getElementById('setupStageButton').classList.toggle('hidden',!enabled);if(!enabled){document.getElementById('setupStage').classList.add('hidden');document.getElementById('loginStage').classList.remove('hidden');document.getElementById('loginStageButton').className='btn-secondary'}}
    async function refreshAuthStage(){try{const data=await loadAdminStatus();const initialized=!!data.initialized;adminInitialized=initialized;setSetupAvailability(!initialized);document.getElementById('authStageHint').textContent=initialized?tr('canLogin'):tr('needsSetup');showAuthStage(initialized?'login':'setup');return initialized}catch(err){adminInitialized=true;setSetupAvailability(false);setOutput(tr('loadAdminFailed',{error:err.message}),'loginOutput');showAuthStage('login');return true}}
    function refreshAdminHeader(){const profile=adminProfile();document.getElementById('adminDisplayName').textContent=profile?.username||tr('administrator');document.getElementById('adminDisplayMeta').textContent=profile?.email||tr('signedIn');const on=!!token();document.getElementById('authBadge').textContent=on?tr('loggedIn'):tr('loggedOut');document.getElementById('authBadge').className='badge '+(on?'ok':'warn')}
    function showApp(on){document.getElementById('loginView').classList.toggle('hidden',on);document.getElementById('appView').classList.toggle('hidden',!on);refreshAdminHeader();if(!on)refreshAuthStage()}
    function openTab(name){localStorage.setItem(activeTabKey,name);document.querySelectorAll('.nav button').forEach(v=>v.classList.toggle('active',v.dataset.tab===name));document.querySelectorAll('.panel').forEach(v=>v.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');document.getElementById('pageTitle').textContent=tr(tabMeta[name][0]);document.getElementById('pageSubtitle').textContent=tr(tabMeta[name][1])}
    function restoreTab(){openTab(localStorage.getItem(activeTabKey)||'overview')}
    function renderHubs(items){const root=document.getElementById('hubs');document.getElementById('hubCountHero').textContent=String(items.length);if(!items.length){root.innerHTML='<div class="hint">'+tr('emptyHubs')+'</div>';return;}root.innerHTML=items.map(h=>{const disabled=!!h.is_disabled;const online=h.status==='online';const cls=disabled?'danger':(online?'ok':'warn');const txt=disabled?tr('disabled'):(online?tr('online'):tr('offline'));const visibility=(h.visibility||'private').toLowerCase()==='shared'?'shared':'private';return `<div class="item hub-card"><div class="item-head"><div><div class="item-title">${h.name||h.id}</div><div class="item-meta mono">${h.base_url||tr('na')}</div></div><span class="badge ${cls}">${txt}</span></div><div class="item-meta">${tr('owner')}: ${h.owner_email||tr('na')}<br>${tr('visibility')}: ${visibility==='shared'?tr('visibilityShared'):tr('visibilityPrivate')}<br>${tr('enrollment')}: ${h.enrollment_mode||tr('na')}<br>${tr('host')}: ${h.host||tr('na')}${h.port?':'+h.port:''}<br>${tr('lastSeen')}: ${h.last_seen_at||tr('na')}</div><div style="margin-top:12px"><label for="hub-visibility-${h.id}">${tr('visibility')}</label><select id="hub-visibility-${h.id}"><option value="private"${visibility==='private'?' selected':''}>${tr('visibilityPrivate')}</option><option value="shared"${visibility==='shared'?' selected':''}>${tr('visibilityShared')}</option></select></div><div class="actions"><button class="btn-secondary" onclick="updateHubVisibility('${h.id}')">${tr('saveVisibility')}</button>${disabled?`<button class="btn-secondary" onclick="toggleHub('${h.id}',false)">${tr('enableHub')}</button>`:`<button class="btn-danger" onclick="toggleHub('${h.id}',true)">${tr('disableHub')}</button>`}<button class="btn-ghost" onclick="deleteHub('${h.id}')">${tr('deleteHub')}</button></div></div>`}).join('')}
    function renderBlockedEmails(items){const root=document.getElementById('blockedEmails');document.getElementById('blockedEmailCountHero').textContent=String(items.length);if(!items.length){root.innerHTML='<div class="hint">'+tr('emptyBlockedEmails')+'</div>';return;}root.innerHTML=items.map(v=>`<div class="item"><div class="item-head"><div class="item-title">${v.email}</div><span class="badge danger">${tr('blockedEmail')}</span></div><div class="item-meta">${v.reason||tr('noReason')}</div></div>`).join('')}
    function renderBlockedIPs(items){const root=document.getElementById('blockedIPs');document.getElementById('blockedIPCountHero').textContent=String(items.length);if(!items.length){root.innerHTML='<div class="hint">'+tr('emptyBlockedIps')+'</div>';return;}root.innerHTML=items.map(v=>`<div class="item"><div class="item-head"><div class="item-title mono">${v.ip}</div><span class="badge danger">${tr('blockedIp')}</span></div><div class="item-meta">${v.reason||tr('noReason')}</div></div>`).join('')}
    async function setupAdmin(){try{if(adminInitialized){setSetupAvailability(false);showAuthStage('login');document.getElementById('loginPassword').focus();return}const username=document.getElementById('setupUsername').value.trim();const data=await api('/api/admin/setup',{method:'POST',body:JSON.stringify({username,password:document.getElementById('setupPassword').value})});document.getElementById('loginUsername').value=username;document.getElementById('loginPassword').value='';adminInitialized=true;setSetupAvailability(false);setOutput(tr('setupDone',{message:data.message||tr('administrator')}),'loginOutput');showAuthStage('login');document.getElementById('loginPassword').focus()}catch(err){setOutput(tr('setupFailed',{error:err.message}),'loginOutput')}}
    async function loginAdmin(){try{const data=await api('/api/admin/login',{method:'POST',body:JSON.stringify({username:document.getElementById('loginUsername').value.trim(),password:document.getElementById('loginPassword').value})});localStorage.setItem(adminTokenKey,data.access_token);localStorage.setItem(adminProfileKey,JSON.stringify(data.admin||{}));showApp(true);restoreTab();await refreshAll()}catch(err){setOutput(tr('loginFailed',{error:err.message}),'loginOutput')}}
    function logoutAdmin(){localStorage.removeItem(adminTokenKey);localStorage.removeItem(adminProfileKey);showApp(false)}
    async function listHubs(){try{const data=await api('/api/admin/hubs');renderHubs(data.hubs||[])}catch(err){setOutput(tr('hubsLoadFailed',{error:err.message}))}}
    async function updateHubVisibility(id){try{const visibility=document.getElementById(`hub-visibility-${id}`).value;await api(`/api/admin/hubs/${encodeURIComponent(id)}/visibility`,{method:'POST',body:JSON.stringify({visibility})});const msg=tr('visibilitySaved');setOutput(msg);showToast(msg,'success');await listHubs()}catch(err){const msg=tr('updateVisibilityFailed',{error:err.message});setOutput(msg);showToast(msg,'error')}}
    async function toggleHub(id,disable){try{const path=disable?`/api/admin/hubs/${encodeURIComponent(id)}/disable`:`/api/admin/hubs/${encodeURIComponent(id)}/enable`;const data=await api(path,{method:'POST',body:JSON.stringify({})});const msg=data.message||(disable?tr('hubDisabled'):tr('hubEnabled'));setOutput(msg);showToast(msg,'success');await listHubs()}catch(err){const msg=tr('toggleHubFailed',{error:err.message});setOutput(msg);showToast(msg,'error')}}
    async function deleteHub(id){try{const data=await api(`/api/admin/hubs/${encodeURIComponent(id)}`,{method:'DELETE'});const msg=data.message||tr('hubDeleted');setOutput(msg);showToast(msg,'success');await listHubs()}catch(err){const msg=tr('deleteHubFailed',{error:err.message});setOutput(msg);showToast(msg,'error')}}
    async function addBlockedEmail(){try{await api('/api/admin/blocked-emails',{method:'POST',body:JSON.stringify({email:document.getElementById('blockedEmail').value.trim(),reason:document.getElementById('blockedEmailReason').value.trim()})});setOutput(tr('blockedEmailAdded'));await listBlockedEmails()}catch(err){setOutput(tr('blockedEmailAddFailed',{error:err.message}))}}
    async function listBlockedEmails(){try{const data=await api('/api/admin/blocked-emails');renderBlockedEmails(data.blocked_emails||[])}catch(err){setOutput(tr('blockedEmailsLoadFailed',{error:err.message}))}}
    async function addBlockedIP(){try{await api('/api/admin/blocked-ips',{method:'POST',body:JSON.stringify({ip:document.getElementById('blockedIP').value.trim(),reason:document.getElementById('blockedIPReason').value.trim()})});setOutput(tr('blockedIpAdded'));await listBlockedIPs()}catch(err){setOutput(tr('blockedIpAddFailed',{error:err.message}))}}
    async function listBlockedIPs(){try{const data=await api('/api/admin/blocked-ips');renderBlockedIPs(data.blocked_ips||[])}catch(err){setOutput(tr('blockedIpsLoadFailed',{error:err.message}))}}
    async function changeAdminPassword(){const currentPassword=document.getElementById('currentPasswordInput').value;const newPassword=document.getElementById('newPasswordInput').value;const confirmPassword=document.getElementById('confirmPasswordInput').value;if(!currentPassword||!newPassword){const msg=tr('requestFailed');setOutput(msg);showToast(msg,'error');return}if(newPassword!==confirmPassword){const msg=ptr('mismatch');setOutput(msg);showToast(msg,'error');return}try{const data=await api('/api/admin/password',{method:'POST',body:JSON.stringify({current_password:currentPassword,new_password:newPassword})});if(data.access_token)localStorage.setItem(adminTokenKey,data.access_token);if(data.admin)localStorage.setItem(adminProfileKey,JSON.stringify(data.admin));document.getElementById('currentPasswordInput').value='';document.getElementById('newPasswordInput').value='';document.getElementById('confirmPasswordInput').value='';refreshAdminHeader();const msg=ptr('changed');setOutput(msg);showToast(msg,'success')}catch(err){setOutput(err.message);showToast(err.message,'error')}}
    async function refreshAll(){await Promise.all([listHubs(),listBlockedEmails(),listBlockedIPs()])}
    applyI18n();if(token()){showApp(true);restoreTab();refreshAll()}else{showApp(false);refreshAuthStage()}
  </script>
</body>
</html>
